<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>EduVault — Academic Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
:root{--navy:#0B1120;--navy-2:#111827;--navy-3:#1a2436;--navy-4:#243045;--gold:#C9A84C;--gold-lt:#E8C96A;--gold-dk:#A8882A;--gold-glow:rgba(201,168,76,.18);--white:#FAFAF8;--muted:#6B7A94;--muted-lt:#8D9BB5;--border:rgba(255,255,255,.07);--border-2:rgba(255,255,255,.13);--green:#4CAF76;--green-bg:rgba(76,175,118,.12);--amber:#E8A838;--amber-bg:rgba(232,168,56,.12);--red:#E05555;--red-bg:rgba(224,85,85,.12);--blue:#5B9BD5;--blue-bg:rgba(91,155,213,.12);--purple:#9B7FD4;--purple-bg:rgba(155,127,212,.12);--glass:rgba(255,255,255,.04);--glass-2:rgba(255,255,255,.08);--shadow:0 8px 32px rgba(0,0,0,.4);--shadow-sm:0 2px 8px rgba(0,0,0,.3);--r-sm:8px;--r-md:12px;--r-lg:18px;--r-xl:24px;--t:all .22s cubic-bezier(.4,0,.2,1)}
[data-theme="light"]{--navy:#F0EDE8;--navy-2:#E8E4DC;--navy-3:#DDD8CF;--navy-4:#D0C9BC;--gold:#8B5E1A;--gold-lt:#A67422;--gold-dk:#6B4812;--gold-glow:rgba(139,94,26,.12);--white:#1a1208;--muted:#6B5C44;--muted-lt:#8B7355;--border:rgba(0,0,0,.09);--border-2:rgba(0,0,0,.15);--green:#2D7A4E;--green-bg:rgba(45,122,78,.1);--amber:#9B6E18;--amber-bg:rgba(155,110,24,.1);--red:#B83030;--red-bg:rgba(184,48,48,.1);--blue:#2B5FA3;--blue-bg:rgba(43,95,163,.1);--purple:#6B4FAA;--purple-bg:rgba(107,79,170,.1);--glass:rgba(0,0,0,.03);--glass-2:rgba(0,0,0,.06);--shadow:0 8px 32px rgba(0,0,0,.12);--shadow-sm:0 2px 8px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--white);min-height:100vh;transition:background .35s,color .35s}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
.nav{background:rgba(11,17,32,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border-2);padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
[data-theme="light"] .nav{background:rgba(240,237,232,.9)}
.nav-logo{width:36px;height:36px;border-radius:9px;background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));display:flex;align-items:center;justify-content:center;color:var(--navy-2);font-family:'DM Serif Display',serif;font-size:17px;box-shadow:0 2px 10px var(--gold-glow);flex-shrink:0}
.nav-brand{font-family:'DM Serif Display',serif;font-size:17px;color:var(--white)}
.nav-sub{font-size:10.5px;color:var(--muted);margin-top:1px;letter-spacing:.04em}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:210px;flex-shrink:0;background:var(--navy-2);border-right:1px solid var(--border);padding:1.25rem 0;position:sticky;top:60px;height:calc(100vh - 60px);overflow-y:auto}
.sidebar::-webkit-scrollbar{width:3px}.sidebar::-webkit-scrollbar-thumb{background:var(--navy-4)}
.sb-label{font-size:9.5px;font-weight:600;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;padding:0 1rem;margin-bottom:.4rem;margin-top:1.1rem}
.sb-label:first-child{margin-top:0}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 1rem;font-size:13px;font-weight:500;color:var(--muted-lt);cursor:pointer;border-left:3px solid transparent;transition:var(--t)}
.sb-item:hover{background:var(--glass);color:var(--white)}
.sb-item.active{background:var(--gold-glow);color:var(--gold-lt);border-left-color:var(--gold)}
.sb-icon{width:15px;text-align:center;font-size:13px;flex-shrink:0}
.main{flex:1;padding:1.75rem 2rem;overflow-x:hidden;min-width:0}
.card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;backdrop-filter:blur(8px);transition:border-color .2s}
.card:hover{border-color:var(--border-2)}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.9rem;margin-bottom:1.4rem}
.metric-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.1rem 1.25rem;transition:var(--t)}
.metric-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm);border-color:var(--border-2)}
.metric-icon{font-size:20px;margin-bottom:.5rem}
.metric-label{font-size:10.5px;font-weight:500;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.25rem}
.metric-value{font-size:28px;font-weight:300;color:var(--white);line-height:1;font-family:'DM Serif Display',serif}
.metric-sub{font-size:11px;color:var(--muted);margin-top:.35rem}
.metric-gold .metric-value{color:var(--gold-lt)}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-amber{background:var(--amber-bg);color:var(--amber)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-gold{background:var(--gold-glow);color:var(--gold-lt)}
.badge-muted{background:var(--glass-2);color:var(--muted-lt)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r-sm);border:1px solid var(--border-2);background:var(--glass-2);cursor:pointer;font-size:12.5px;font-weight:500;color:var(--muted-lt);font-family:'DM Sans',sans-serif;transition:var(--t)}
.btn:hover{background:var(--glass);color:var(--white)}
.btn:active{transform:scale(.97)}
.btn-gold{background:linear-gradient(135deg,var(--gold-dk),var(--gold));color:var(--navy-2);border-color:transparent;font-weight:600}
.btn-gold:hover{background:linear-gradient(135deg,var(--gold),var(--gold-lt));color:var(--navy)}
.btn-green{background:var(--green-bg);color:var(--green);border-color:transparent}
.btn-green:hover{background:rgba(76,175,118,.22);color:var(--green)}
.btn-red{background:var(--red-bg);color:var(--red);border-color:transparent}
.btn-red:hover{background:rgba(224,85,85,.22);color:var(--red)}
.btn-sm{padding:4px 10px;font-size:11.5px}
.btn-xs{padding:3px 8px;font-size:11px}
.form-group{margin-bottom:.9rem}
.form-label{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.4rem;display:block}
.form-input{width:100%;padding:8px 12px;border:1px solid var(--border-2);border-radius:var(--r-sm);font-size:13.5px;background:var(--navy-3);color:var(--white);font-family:'DM Sans',sans-serif;outline:none;transition:var(--t)}
[data-theme="light"] .form-input{background:rgba(0,0,0,.04)}
.form-input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gold-glow)}
.form-input::placeholder{color:var(--muted)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.9rem}
.table-wrap{overflow-x:auto;border-radius:var(--r-md)}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead{background:var(--navy-3)}
th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
td{padding:12px 14px;border-bottom:1px solid var(--border);color:var(--white);vertical-align:middle}
tbody tr{transition:background .15s}
tbody tr:hover{background:var(--glass)}
tbody tr:last-child td{border-bottom:none}
.progress{height:5px;background:var(--navy-4);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
.toggle{position:relative;width:40px;height:22px;cursor:pointer;display:inline-block}
.toggle input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:var(--navy-4);border-radius:22px;transition:var(--t);border:1px solid var(--border-2)}
.toggle input:checked+.toggle-track{background:var(--gold);border-color:var(--gold)}
.toggle-thumb{position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:var(--t)}
.toggle input:checked~.toggle-thumb{transform:translateX(18px)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);animation:fadeIn .15s ease;padding:1rem}
.modal{background:var(--navy-2);border:1px solid var(--border-2);border-radius:var(--r-xl);padding:1.75rem;width:100%;max-width:520px;box-shadow:var(--shadow);animation:slideUp .2s cubic-bezier(.4,0,.2,1);max-height:90vh;overflow-y:auto}
.modal-title{font-family:'DM Serif Display',serif;font-size:19px;color:var(--white);margin-bottom:1.25rem}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:fadeInUp .25s cubic-bezier(.4,0,.2,1)}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--navy);position:relative;overflow:hidden;padding:1.5rem}
.login-bg::before{content:'';position:absolute;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.07),transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}
.login-box{width:100%;max-width:390px;position:relative;z-index:1}
.login-logo{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,var(--gold-dk),var(--gold-lt));display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-family:'DM Serif Display',serif;font-size:26px;color:var(--navy-2);box-shadow:0 6px 28px var(--gold-glow)}
.login-title{font-family:'DM Serif Display',serif;font-size:26px;color:var(--white);text-align:center;margin-bottom:.3rem}
.login-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:1.5rem}
.role-tabs{display:flex;background:var(--navy-3);border-radius:var(--r-md);padding:3px;gap:3px;margin-bottom:1.25rem;border:1px solid var(--border)}
.role-tab{flex:1;padding:8px;border-radius:var(--r-sm);border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);font-family:'DM Sans',sans-serif;transition:var(--t)}
.role-tab.active{background:var(--navy-2);color:var(--white);box-shadow:var(--shadow-sm)}
.hint-bar{background:var(--blue-bg);border:1px solid rgba(91,155,213,.2);border-radius:var(--r-sm);padding:9px 12px;font-size:11.5px;color:var(--blue);margin-bottom:1.1rem;font-family:'JetBrains Mono',monospace;line-height:1.6}
.error-msg{font-size:12.5px;color:var(--red);background:var(--red-bg);padding:9px 12px;border-radius:var(--r-sm);margin-bottom:.9rem}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:.75rem}
.section-title{font-family:'DM Serif Display',serif;font-size:21px;color:var(--white)}
.section-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.avatar-lg{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',serif;font-size:24px;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.13)}
.avatar-sm{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.profile-hero{background:linear-gradient(135deg,rgba(201,168,76,.09),rgba(201,168,76,.03));border:1px solid rgba(201,168,76,.18);border-radius:var(--r-xl);padding:1.75rem;display:flex;gap:1.5rem;align-items:center;margin-bottom:1.4rem;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;right:-30px;top:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,var(--gold-glow),transparent 70%)}
.profile-name{font-family:'DM Serif Display',serif;font-size:24px;color:var(--white)}
.profile-meta{font-size:12.5px;color:var(--muted);margin-top:.3rem}
.profile-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.65rem}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem}
@media(max-width:900px){.two-col,.three-col{grid-template-columns:1fr}}
@media(max-width:600px){.sidebar{display:none}.main{padding:1rem}.profile-hero{flex-direction:column}.form-row{grid-template-columns:1fr}}
.bar-chart{display:flex;align-items:flex-end;gap:8px;padding-top:.75rem}
.bar-chart-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar-chart-bar{width:100%;border-radius:4px 4px 0 0;min-width:20px;transition:height .5s cubic-bezier(.4,0,.2,1)}
.bar-chart-label{font-size:9.5px;color:var(--muted);white-space:nowrap;font-family:'JetBrains Mono',monospace}
.subj-bar{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.subj-bar:last-child{border-bottom:none}
.subj-bar-name{font-size:13px;font-weight:500;color:var(--white);flex:0 0 155px}
.subj-bar-track{flex:1}
.subj-bar-score{font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--muted-lt);flex:0 0 36px;text-align:right}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:.9rem}
.att-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-md);padding:1.1rem;display:flex;flex-direction:column;gap:.65rem;transition:var(--t)}
.att-card:hover{border-color:var(--border-2);transform:translateY(-2px)}
.att-pct{font-family:'DM Serif Display',serif;font-size:26px;line-height:1}
.schedule-row{display:flex;gap:10px;align-items:stretch;padding:9px 0;border-bottom:1px solid var(--border)}
.schedule-row:last-child{border-bottom:none}
.schedule-time{flex:0 0 80px;font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--muted);padding-top:2px}
.schedule-bar{width:3px;border-radius:2px;flex-shrink:0}
.schedule-subj{font-size:13.5px;font-weight:500;color:var(--white)}
.schedule-room{font-size:11px;color:var(--muted);margin-top:2px}
.exam-card{display:flex;align-items:center;gap:.9rem;padding:.9rem 1.1rem;background:var(--glass);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:.65rem;transition:var(--t)}
.exam-card:hover{border-color:var(--border-2)}
.exam-date-box{background:var(--gold-glow);border:1px solid rgba(201,168,76,.22);border-radius:var(--r-sm);padding:.45rem .6rem;text-align:center;flex-shrink:0;min-width:48px}
.exam-day{font-family:'DM Serif Display',serif;font-size:20px;color:var(--gold-lt);line-height:1}
.exam-month{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.exam-subj{font-size:13.5px;font-weight:500;color:var(--white)}
.exam-meta{font-size:11px;color:var(--muted);margin-top:2px}
.todo-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.todo-item:last-child{border-bottom:none}
.todo-check{width:17px;height:17px;border-radius:5px;border:1.5px solid var(--border-2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t);flex-shrink:0;font-size:10px}
.todo-check.done{background:var(--green);border-color:var(--green);color:#fff}
.todo-text{font-size:13px;color:var(--white);flex:1}
.todo-text.done{color:var(--muted);text-decoration:line-through}
.ann{background:linear-gradient(135deg,rgba(91,155,213,.07),rgba(91,155,213,.02));border:1px solid rgba(91,155,213,.18);border-radius:var(--r-md);padding:.9rem 1.1rem;margin-bottom:.65rem}
.ann-title{font-size:13.5px;font-weight:600;color:var(--white);margin-bottom:.25rem}
.ann-body{font-size:12.5px;color:var(--muted)}
.ann-date{font-size:10px;color:var(--muted);margin-top:.4rem;font-family:'JetBrains Mono',monospace}
.rank-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r-md);transition:var(--t)}
.rank-item:hover{background:var(--glass)}
.rank-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);width:18px}
.search-wrap{position:relative}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.search-input{padding-left:32px!important}
.empty{text-align:center;padding:2.5rem;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:.75rem;opacity:.45}
.empty-text{font-size:13.5px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--navy-4);border-radius:3px}
.company-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:1rem}
.company-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;transition:var(--t);cursor:pointer}
.company-card:hover{border-color:var(--border-2);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.elig-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.elig-row:last-child{border-bottom:none}
.elig-icon{font-size:16px;flex-shrink:0}
.elig-label{font-size:13px;color:var(--white);flex:1}
.elig-result{font-size:12px;font-weight:600}
.pipeline{display:flex;gap:0;margin:1.25rem 0;overflow-x:auto;padding-bottom:4px}
.pipe-step{flex:1;min-width:80px;text-align:center;position:relative;padding:0 4px}
.pipe-step::after{content:'';position:absolute;top:14px;left:50%;width:100%;height:2px;background:var(--border-2);z-index:0}
.pipe-step:last-child::after{display:none}
.pipe-dot{width:28px;height:28px;border-radius:50%;background:var(--navy-4);border:2px solid var(--border-2);display:flex;align-items:center;justify-content:center;margin:0 auto .4rem;position:relative;z-index:1;font-size:11px;transition:var(--t)}
.pipe-dot.active{background:var(--gold);border-color:var(--gold);color:var(--navy-2)}
.pipe-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.pipe-dot.rejected{background:var(--red);border-color:var(--red);color:#fff}
.pipe-label{font-size:10px;color:var(--muted);white-space:nowrap}
.pipe-label.active{color:var(--gold-lt);font-weight:600}
.pipe-label.done{color:var(--green);font-weight:600}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-head{font-size:10px;font-weight:600;color:var(--muted);text-align:center;padding:6px 0;text-transform:uppercase;letter-spacing:.05em}
.cal-day{min-height:64px;border-radius:var(--r-sm);border:1px solid var(--border);padding:5px;transition:var(--t);background:var(--glass)}
.cal-day:hover{border-color:var(--border-2);background:var(--glass-2)}
.cal-day.today{border-color:var(--gold);background:var(--gold-glow)}
.cal-day.other-month{opacity:.25}
.cal-date{font-size:11.5px;font-weight:600;color:var(--white);margin-bottom:3px}
.cal-day.today .cal-date{color:var(--gold-lt)}
.cal-event{font-size:9px;padding:2px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.1rem}
.cal-month{font-family:'DM Serif Display',serif;font-size:18px;color:var(--white)}
.club-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:1rem}
.club-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.25rem;transition:var(--t)}
.club-card:hover{border-color:var(--border-2);transform:translateY(-2px)}
.faculty-card{display:flex;gap:14px;align-items:center;padding:12px;border-radius:var(--r-md);background:var(--glass);border:1px solid var(--border);transition:var(--t);margin-bottom:.65rem}
.faculty-card:hover{border-color:var(--border-2);background:var(--glass-2)}
.grievance-item{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem 1.1rem;margin-bottom:.65rem;transition:var(--t)}
.grievance-item:hover{border-color:var(--border-2)}
.notice-card{border-radius:var(--r-md);padding:.9rem 1.1rem;margin-bottom:.65rem;border-left:3px solid}
.notice-urgent{background:var(--red-bg);border-color:var(--red)}
.notice-info{background:var(--blue-bg);border-color:var(--blue)}
.notice-event{background:var(--purple-bg);border-color:var(--purple)}
.notice-title{font-size:13.5px;font-weight:600;color:var(--white);margin-bottom:.25rem}
.notice-body{font-size:12.5px;color:var(--muted)}
.notice-footer{display:flex;align-items:center;justify-content:space-between;margin-top:.5rem;font-size:10.5px;color:var(--muted);font-family:'JetBrains Mono',monospace}
.backlog-item{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.backlog-item:last-child{border-bottom:none}
.fee-card{background:var(--glass);border:1px solid var(--border);border-radius:var(--r-md);padding:1rem 1.25rem;display:flex;align-items:center;gap:1rem;margin-bottom:.65rem}
.trend-chart{display:flex;align-items:flex-end;gap:12px;height:100px;margin-top:.75rem;padding:0 .25rem}
.trend-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.trend-bar{width:100%;border-radius:4px 4px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1);min-height:4px}
.trend-val{font-size:10px;color:var(--gold-lt);font-family:'JetBrains Mono',monospace}
.trend-sem{font-size:9.5px;color:var(--muted)}
.predictor-result{border-radius:var(--r-md);padding:1rem 1.25rem;margin-top:1rem;border:1px solid}
.tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:1.25rem}
.tab{padding:8px 16px;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--muted);font-weight:500;transition:var(--t);border-radius:var(--r-sm) var(--r-sm) 0 0}
.tab:hover{color:var(--white);background:var(--glass)}
.tab.active{color:var(--gold-lt);border-bottom-color:var(--gold)}

function PageCGPAPredictor({student,myMarks}){
  const totalCredits=SUBJECTS.reduce((s,sub)=>s+sub.credits,0);
  const [targetGPA,setTargetGPA]=useState('9.0');
  const currentTotal=myMarks.reduce((s,m)=>s+m.total_marks,0);
  const subjectsDone=myMarks.length;
  const subjectsLeft=SUBJECTS.length-subjectsDone;
  const tg=parseFloat(targetGPA)||0;
  const targetTotalMarks=Math.round((tg/10)*SUBJECTS.length*150);
  const needed=targetTotalMarks-currentTotal;
  const maxPossible=subjectsLeft*150;
  const neededPct=subjectsLeft>0?Math.round((needed/maxPossible)*100):0;
  const feasible=neededPct<=100&&neededPct>=0;
  const creditsEarned=myMarks.reduce((s,m)=>{const sub=SUBJECTS.find(x=>x.subject_id===m.subject_id);return s+(sub?sub.credits:0);},0);
  const ringPct=creditsEarned/totalCredits;
  const r=40,circ=2*Math.PI*r;
  return R('div',{className:'page-enter'},
    R('div',{className:'section-head'},R('div',null,R('div',{className:'section-title'},'CGPA Predictor'),R('div',{className:'section-sub'},'Calculate what you need to hit your target GPA'))),
    R('div',{className:'two-col'},
      R('div',{className:'card'},
        R('div',{className:'form-group'},
          R('label',{className:'form-label'},'Target CGPA (out of 10.0)'),
          R('input',{className:'form-input',type:'number',min:'0',max:'10',step:'0.1',value:targetGPA,onChange:ev=>setTargetGPA(ev.target.value),style:{fontSize:'1.4rem',fontFamily:'DM Serif Display',color:'var(--gold-lt)',textAlign:'center'}})
        ),
        R('div',{style:{display:'flex',gap:'1.5rem',marginBottom:'1rem'}},
          R('div',null,R('div',{style:{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}},'Current GPA'),R('div',{style:{fontFamily:'DM Serif Display',fontSize:30,color:'var(--white)'}},calcGPA(myMarks))),
          R('div',null,R('div',{style:{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}},'Subjects Done'),R('div',{style:{fontFamily:'DM Serif Display',fontSize:30,color:'var(--white)'}},subjectsDone)),
          R('div',null,R('div',{style:{fontSize:10,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'.05em'}},'Subjects Left'),R('div',{style:{fontFamily:'DM Serif Display',fontSize:30,color:'var(--white)'}},subjectsLeft))
        ),
        subjectsLeft===0
          ?R('div',{style:{padding:'1rem',background:'var(--green-bg)',border:'1px solid rgba(76,175,118,.25)',borderRadius:'var(--r-md)',color:'var(--green)',fontSize:13}},'✓ All subjects completed. Your final GPA is '+calcGPA(myMarks)+'.')
          :R('div',{className:'predictor-result',style:{background:feasible?'var(--gold-glow)':'var(--red-bg)',borderColor:feasible?'rgba(201,168,76,.3)':'rgba(224,85,85,.3)'}},
            R('div',{style:{fontFamily:'DM Serif Display',fontSize:42,color:feasible?'var(--gold-lt)':'var(--red)',lineHeight:1}},neededPct+'%'),
            R('div',{style:{fontSize:13,color:'var(--muted)',marginTop:'.4rem'}},feasible?'Required score in each remaining subject':'Target GPA of '+tg+' is not achievable. Try a lower target.'),
            feasible&&R('div',{style:{fontSize:11.5,color:'var(--muted)',marginTop:'.3rem'}},'Need '+needed+' marks across '+subjectsLeft+' subject(s) (max '+maxPossible+')')
          )
      ),
      R('div',{style:{display:'flex',flexDirection:'column',gap:'1.25rem'}},
        R('div',{className:'card'},
          R('div',{style:{fontFamily:'DM Serif Display',fontSize:17,color:'var(--white)',marginBottom:'.75rem'}},'GPA Trend by Semester'),
          R('div',{className:'trend-chart'},
            SEMESTER_TREND.map(d=>{

              return R('div',{key:d.sem,className:'trend-col'},
                R('div',{className:'trend-val'},d.gpa),

          R('div',{style:{display:'flex',alignItems:'center',gap:'1.25rem'}},
            R('svg',{width:90,height:90,viewBox:'0 0 100 100'},

              R('circle',{cx:50,cy:50,r:40,fill:'none',stroke:'var(--gold)',strokeWidth:12,strokeDasharray:circ,strokeDashoffset:circ*(1-ringPct),strokeLinecap:'round',transform:'rotate(-90 50 50)',style:{transition:'stroke-dashoffset .7s ease'}})

function PageCalendar(){
  const [month,setMonth]=useState(3);

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date();
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const getEvs=d=>{
    const key=year+'-'+(String(month+1).padStart(2,'0'))+'-'+(String(d).padStart(2,'0'));
    return CAL_EVENTS.filter(e=>e.date===key);
  };
  return R('div',{className:'page-enter'},

        R('div',{className:'cal-month'},MONTHS[month]+' '+year),
        R('button',{className:'btn btn-sm',onClick:()=>setMonth(m=>Math.min(11,m+1))},'→')

        cells.map((d,i)=>{

// ── MAIN DASHBOARD SHELLS ────────────────────────────────────────────────────
function StudentDashboard({user}){
  const [page,setPage]=useState('dashboard');
  const student=STUDENTS.find(s=>s.student_id===user.student_id);
  const myMarks=INITIAL_MARKS.filter(m=>m.student_id===user.student_id);
  const myAtt=ATTENDANCE.filter(a=>a.student_id===user.student_id);
  const [todos,setTodos]=useState(TODOS_DEFAULT);
  const [notices,setNotices]=useState(NOTICES);
  const [grievances,setGrievances]=useState(GRIEVANCES_DEFAULT);

  const renderPage=()=>{
    switch(page){
      case'dashboard':  return R(StudentHome,{student,myMarks,myAtt,todos,setTodos});
      case'marks':      return R(StudentMarks,{myMarks});
      case'attendance': return R(StudentAttendance,{myAtt});
      case'predictor':  return R(PageCGPAPredictor,{student,myMarks});
      case'backlogs':   return R(PageBacklogs,{student});
      case'schedule':   return R(StudentSchedule,{myMarks});
      case'exams':      return R(StudentExams,{});
      case'todos':      return R(StudentTodos,{todos,setTodos});
      case'placement':  return R(PagePlacement,{student});
      case'calendar':   return R(PageCalendar,{});
      case'clubs':      return R(PageClubs,{});
      case'faculty':    return R(PageFaculty,{});
      case'notices':    return R(PageNotices,{role:'student',notices,setNotices});
      case'grievances': return R(PageGrievances,{role:'student',grievances,setGrievances});
      case'fees':       return R(PageFees,{});
      default:          return R(StudentHome,{student,myMarks,myAtt,todos,setTodos});
    }
  };
  return R('div',{className:'layout'},R(Sidebar,{page,setPage,role:'student'}),R('div',{className:'main'},renderPage()));
}

function AdminDashboard(){
  const [page,setPage]=useState('overview');
  const [marks,setMarks]=useState(INITIAL_MARKS);
  const [students,setStudents]=useState(STUDENTS);
  const [notices,setNotices]=useState(NOTICES);
  const [grievances,setGrievances]=useState(GRIEVANCES_DEFAULT);

  const renderPage=()=>{
    switch(page){
      case'overview':   return R(AdminOverview,{marks,students});
      case'students':   return R(AdminStudents,{students,setStudents});
      case'marks':      return R(AdminMarks,{marks,setMarks});
      case'attendance': return R(AdminAttendance,{});
      case'analytics':  return R(AdminAnalytics,{marks,students});
      case'notices':    return R(PageNotices,{role:'admin',notices,setNotices});
      case'grievances': return R(PageGrievances,{role:'admin',grievances,setGrievances});
      default:          return R(AdminOverview,{marks,students});
    }
  };
  return R('div',{className:'layout'},R(Sidebar,{page,setPage,role:'admin'}),R('div',{className:'main'},renderPage()));
}

function App(){
  const [user,setUser]=useState(null);
  const [dark,setDark]=useState(true);
  useEffect(()=>{document.documentElement.setAttribute('data-theme',dark?'dark':'light');},[dark]);
  if(!user)return R(Login,{onLogin:setUser,dark,setDark});
  return R('div',null,
    R(Navbar,{user,dark,setDark,onLogout:()=>setUser(null)}),
    user.role==='admin'?R(AdminDashboard):R(StudentDashboard,{user})
  );
}

ReactDOM.render(R(App),document.getElementById('root'));
